spring:
  application:
    name: bank-accounts-module

  datasource:
    url: jdbc:h2:file:./data/bankdb;AUTO_SERVER=TRUE;DB_CLOSE_DELAY=-1
    driver-class-name: org.h2.Driver
    username: sa
    password: ""

  jpa:
    hibernate:
      ddl-auto: validate
    properties:
      hibernate:
        format_sql: true
    open-in-view: false

  flyway:
    enabled: true
    locations: classpath:db/migration
    baseline-on-migrate: true

  # SMTP Яндекс.Почта (smtp.yandex.ru:465, SSL).
  # Логин и пароль берутся из переменных окружения MAIL_USERNAME и MAIL_PASSWORD.
  # Пароль — это "пароль приложения" из id.yandex.ru → Безопасность → Пароли приложений,
  # обычный пароль от аккаунта НЕ подходит.
  mail:
    host: smtp.yandex.ru
    port: 465
    username: ${MAIL_USERNAME:}
    password: ${MAIL_PASSWORD:}
    protocol: smtps
    default-encoding: UTF-8
    properties:
      mail:
        smtp:
          auth: true
          ssl:
            enable: true
            trust: smtp.yandex.ru
          starttls:
            enable: false
        smtps:
          auth: true
          ssl:
            enable: true
            trust: smtp.yandex.ru
        transport:
          protocol: smtps
        debug: false

  main:
    web-application-type: none # Swing-десктоп, веб-сервер не нужен

app:
  otp:
    length: 6
    ttl-minutes: 5
  mail:
    # "От кого" в письме = ${MAIL_FROM:${MAIL_USERNAME:}} — по умолчанию тот же адрес.
    from: ${MAIL_FROM:${MAIL_USERNAME:}}
    # stub=true — не отправлять реально, печатать OTP в лог.
    # Установлено false: письма уходят на реальные адреса, которые пользователь ввёл при
    # регистрации/входе.
    stub: false

logging:
  level:
    root: INFO
    ru.muiv.diplom: DEBUG
    org.hibernate.SQL: INFO
